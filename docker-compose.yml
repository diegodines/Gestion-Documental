
services:
  # 1. El Guardia Mágico (Traefik)
  traefik:
    image: traefik:v2.11
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
     
      - "8080:80" # Puerto a usar en pacheco
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Le damos acceso a Docker

  # 2. El Backend Node.js
  backend:
    build: ./backend
    labels:
      - "traefik.enable=true"
      # Aquí el contenedor le dice a Traefik: "Mándame todo lo que empiece con /api"
      - "traefik.http.routers.mibackend.rule=PathPrefix(`/api`)"
      - "traefik.http.services.mibackend.loadbalancer.server.port=3000"

  # 3. El Servidor Jenkinsservices:
  jenkins:
    image: jenkins/jenkins:lts
    user: root # A veces necesario para tener permisos sobre el socket
    ports:
      - "8080:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      # Estas dos líneas son la clave:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
  
    labels:
      - "traefik.enable=true"
      # Aquí le dice: "Mándame todo lo que empiece con /jenkins"
      - "traefik.http.routers.mijenkins.rule=PathPrefix(`/jenkins`)"
      - "traefik.http.services.mijenkins.loadbalancer.server.port=8080"

volumes:
  jenkins_data: